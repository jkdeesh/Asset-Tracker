<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#311042"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- App Icon Base Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="url(#goldGrad)" stroke-width="4" opacity="0.3" />

  <!-- Outer Vault Crest / Shield -->
  <path d="M 256 96 L 384 144 V 272 C 384 352 328 416 256 448 C 184 416 128 352 128 272 V 144 Z" fill="url(#shieldGrad)" filter="url(#glow)" opacity="0.9" />

  <!-- Gold Vault Lock Core -->
  <circle cx="256" cy="272" r="72" fill="url(#goldGrad)" />
  <circle cx="256" cy="272" r="52" fill="#0f172a" />

  <!-- Vault Handles / Spikes -->
  <circle cx="256" cy="272" r="16" fill="url(#goldGrad)" />
  <rect x="250" y="210" width="12" height="124" rx="6" fill="url(#goldGrad)" />
  <rect x="250" y="210" width="12" height="124" rx="6" fill="url(#goldGrad)" transform="rotate(60 256 272)" />
  <rect x="250" y="210" width="12" height="124" rx="6" fill="url(#goldGrad)" transform="rotate(120 256 272)" />

  <!-- Diamond / Currency Sparkle -->
  <polygon points="256,120 270,140 256,160 242,140" fill="#fef08a" />
</svg>
